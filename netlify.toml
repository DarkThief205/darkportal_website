[build]
  publish = "."
  functions = "netlify/functions"
  command = "npm run netlify-build"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["sqlite3"]
  included_files = ["routes/**", "assets/**", "*.html", "*.css", "*.js"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/api/:splat"
  status = 200

[[redirects]]
  from = "/auth/*"
  to = "/.netlify/functions/server/auth/:splat"
  status = 200

[[redirects]]
  from = "/bot-invite"
  to = "/.netlify/functions/server/bot-invite"
  status = 200

[[redirects]]
  from = "/support-invite"
  to = "/.netlify/functions/server/support-invite"
  status = 200
