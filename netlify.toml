[build]
  publish = "public"
  functions = "netlify/functions"
  command = "node -e \"console.log('DarkPortal static deploy: no build step')\""

[build.environment]
  NODE_VERSION = "20"
  NPM_CONFIG_REGISTRY = "https://registry.npmjs.org/"
  NPM_CONFIG_PACKAGE_LOCK = "false"
  NPM_CONFIG_AUDIT = "false"
  NPM_CONFIG_FUND = "false"

[functions]
  node_bundler = "esbuild"
  included_files = ["db.js", "server.js", "routes/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200

[[redirects]]
  from = "/auth/*"
  to = "/.netlify/functions/api/auth/:splat"
  status = 200

[[redirects]]
  from = "/bot-invite"
  to = "/.netlify/functions/api/bot-invite"
  status = 200

[[redirects]]
  from = "/support-invite"
  to = "/.netlify/functions/api/support-invite"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
