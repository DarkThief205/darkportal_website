[build]
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--omit=dev"
  DB_PATH = "/tmp/dg.sqlite3"
  DISCORD_BOT_STATUS = "online"
  SECRETS_SCAN_OMIT_KEYS = "GUILD_DASHBOARD_TIMEOUT_MS,DISCORD_BOT_INVITE,DISCORD_CLIENT_ID,SUPPORT_INVITE_URL"

[functions]
  node_bundler = "esbuild"
  included_files = ["server.js", "db.js", "routes/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/auth/*"
  to = "/.netlify/functions/api/auth/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/bot-invite"
  to = "/.netlify/functions/api/bot-invite"
  status = 200
  force = true

[[redirects]]
  from = "/support-invite"
  to = "/.netlify/functions/api/support-invite"
  status = 200
  force = true
