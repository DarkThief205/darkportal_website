<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Tic-Tac-Toe | Dark Portal</title>
  <meta http-equiv="refresh" content="0; url=/games/tictactoe/">
  <script>
    const target = new URL('/games/tictactoe/', location.origin);
    const current = new URL(location.href);

    current.searchParams.forEach((value, key) => {
      target.searchParams.set(key, value);
    });

    location.replace(target.toString());
  </script>
</head>
<body>
  <p>Redirecting to <a href="/games/tictactoe/">Tic-Tac-Toe</a>...</p>
</body>
</html>
